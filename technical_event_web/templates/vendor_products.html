<!DOCTYPE html>
<html>
<head>
    <title>My Products</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">
    <h2>My Products</h2>

    <table class="table table-striped table-bordered mt-4">
        <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Price</th>
            <th>Stock</th>
        </tr>
        </thead>

        <tbody>
        {% for p in products %}
        <tr>
            <td>{{ p[0] }}</td>
            <td>{{ p[1] }}</td>
            <td>₹ {{ p[2] }}</td>
            <td>{{ p[3] }}</td>
        </tr>
        {% endfor %}
        </tbody>
    </table>

    <a href="/vendor_dashboard" class="btn btn-secondary">Back</a>
</div>

</body>
</html>
